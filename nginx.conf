# HTTP服务器配置 - 监听80端口
server {
    listen 80;
    server_name jiamao-liu.com www.jiamao-liu.com;
    
    # 移除HTTPS重定向，直接提供HTTP服务
    # 网站根目录和索引文件配置
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}

# 已删除原有的HTTPS (443端口) 配置块